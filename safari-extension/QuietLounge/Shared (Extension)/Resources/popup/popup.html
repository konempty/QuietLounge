<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuietLounge</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>QuietLounge</h1>
      <p class="subtitle">Quiet Lounge 대시보드</p>
    </header>

    <section class="stats">
      <div class="stat">
        <span class="stat-value" id="blocked-count">0</span>
        <span class="stat-label">총 차단 유저</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="persona-count">0</span>
        <span class="stat-label">ID 확보된 유저</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="nickname-count">0</span>
        <span class="stat-label">닉네임만 확보된 유저</span>
      </div>
    </section>

    <section class="my-stats" id="my-stats-section" style="display:none">
      <div class="my-stats-header">
        <h2>내 활동 통계</h2>
        <button class="btn-refresh" id="btn-refresh-stats" title="통계 갱신">&#x21bb;</button>
      </div>
      <div class="my-stats-grid">
        <div class="my-stat-item">
          <span class="my-stat-value" id="my-total-posts">-</span>
          <span class="my-stat-label">총 작성글</span>
        </div>
        <div class="my-stat-item">
          <span class="my-stat-value" id="my-total-comments">-</span>
          <span class="my-stat-label">총 댓글</span>
        </div>
        <div class="my-stat-item">
          <span class="my-stat-value" id="my-monthly-posts">-</span>
          <span class="my-stat-label">이번달 작성글</span>
        </div>
        <div class="my-stat-item">
          <span class="my-stat-value" id="my-monthly-comments">-</span>
          <span class="my-stat-label">이번달 댓글</span>
        </div>
      </div>
      <p class="my-stats-hint" id="my-stats-hint"></p>
    </section>

    <section class="block-list">
      <h2>차단 목록</h2>
      <div id="block-list-container">
        <p class="empty-message">차단된 유저가 없습니다</p>
      </div>
    </section>

    <section class="settings">
      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-label">흐림 처리</span>
          <span class="setting-desc" id="filter-mode-desc">차단된 글을 완전히 숨깁니다</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="filter-mode-toggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </section>

    <section class="actions">
      <button id="btn-export" class="btn btn-secondary">내보내기 (JSON)</button>
      <button id="btn-import" class="btn btn-secondary">가져오기</button>
      <input type="file" id="file-import" accept=".json" style="display:none">
    </section>

    <footer>
      <p class="support-desc">QuietLounge는 무료이며, 개발·운영 비용은 모두 개발자가 부담하고 있습니다.
        응원하시고 싶으시다면 커피 한 잔으로 응원해 주세요!</p>
      <button class="btn-support" id="btn-support">&#9749; 개발자에게 커피 한 잔 사주기</button>
      <span>v1.0.0</span>
    </footer>
  </div>

  <div class="qr-modal" id="qr-modal">
    <div class="qr-modal-content">
      <button class="qr-modal-close" id="qr-modal-close">&times;</button>
      <h3 class="qr-modal-title">&#9749; 커피 한 잔 사주기</h3>
      <img src="kakaoPayQR.png" alt="카카오페이 QR" class="qr-modal-img">
      <p class="qr-modal-desc" id="qr-modal-desc">카카오톡으로 QR을 스캔해 주세요</p>
      <a href="https://qr.kakaopay.com/FG31jvTdV" target="_blank" class="qr-modal-link" id="qr-modal-mobile-link" style="display:none">카카오페이로 바로 송금하기 &rarr;</a>
    </div>
  </div>

  <script src="../content-scripts/storage-bridge.js"></script>
  <script src="popup.js"></script>
</body>
</html>
