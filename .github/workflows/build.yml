name: Build Artifacts

on:
  workflow_dispatch:

jobs:
  chrome-extension:
    name: Chrome Extension (ZIP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create ZIP
        run: |
          cd chrome-extension
          zip -r ../quietlounge-chrome-extension.zip . -x ".*"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: chrome-extension
          path: quietlounge-chrome-extension.zip

  android-apk:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: |
          cd mobile-app
          npm ci

      - name: Generate native project
        run: |
          cd mobile-app
          npx expo prebuild --platform android --clean

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > mobile-app/android/release.keystore

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cd mobile-app/android
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            -PKEYSTORE_PASSWORD="$KEYSTORE_PASSWORD" \
            -PKEY_ALIAS="$KEY_ALIAS"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: android-apk
          path: mobile-app/android/app/build/outputs/apk/release/app-release.apk
