name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '릴리즈 버전 (예: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  # ── iOS / macOS Safari 익스텐션 컴파일 체크 (서명 없이 빌드만 통과 확인) ──
  # 실제 설치 가능한 산출물은 아니지만, 다른 변경이 iOS/macOS 빌드를 깨지 않는지
  # 보장하는 체크포인트. 실패 시 워크플로우가 중단된다.
  safari-extension-check:
    name: Safari Extension (iOS/macOS) build check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build iOS app + extension (no signing)
        working-directory: safari-extension/QuietLounge
        run: |
          set -o pipefail
          xcodebuild \
            -project QuietLounge.xcodeproj \
            -scheme "QuietLounge (iOS)" \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build | xcpretty || exit 1

      - name: Build macOS app + extension (no signing)
        working-directory: safari-extension/QuietLounge
        run: |
          set -o pipefail
          xcodebuild \
            -project QuietLounge.xcodeproj \
            -scheme "QuietLounge (macOS)" \
            -configuration Debug \
            -destination "generic/platform=macOS" \
            -derivedDataPath build/macos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build | xcpretty || exit 1

      - name: Upload iOS .app artifact (체크포인트 — 실제 설치 불가)
        uses: actions/upload-artifact@v4
        with:
          name: QuietLounge-iOS-unsigned
          path: safari-extension/QuietLounge/build/ios/Build/Products/Debug-iphonesimulator/QuietLounge.app
          if-no-files-found: warn
          retention-days: 14

      - name: Upload macOS .app artifact (체크포인트 — 서명 안 됨)
        uses: actions/upload-artifact@v4
        with:
          name: QuietLounge-macOS-unsigned
          path: safari-extension/QuietLounge/build/macos/Build/Products/Debug/QuietLounge.app
          if-no-files-found: warn
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: safari-extension-check
    steps:
      - uses: actions/checkout@v5

      # ── Chrome Extension ZIP ──
      - name: Create Chrome Extension ZIP
        run: |
          cd chrome-extension
          zip -r ../QuietLounge-ChromeExtension.zip . -x ".*"

      # ── Android APK ──
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: |
          cd mobile-app
          npm ci

      - name: Generate native project
        run: |
          cd mobile-app
          npx expo prebuild --platform android --clean

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > mobile-app/android/release.keystore

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cd mobile-app/android
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            -PKEYSTORE_PASSWORD="$KEYSTORE_PASSWORD" \
            -PKEY_ALIAS="$KEY_ALIAS"

      - name: Rename APK
        run: cp mobile-app/android/app/build/outputs/apk/release/app-release.apk QuietLounge-Android.apk

      # ── GitHub Release ──
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: QuietLounge ${{ github.event.inputs.version }}
          body: |
            ## 다운로드

            | 파일 | 설명 |
            |------|------|
            | `QuietLounge-ChromeExtension.zip` | Chrome 확장 프로그램 (Edge, Brave, Arc 등 호환) |
            | `QuietLounge-Android.apk` | Android 앱 (8.0 이상) |

            ### 설치 방법
            - **PC**: ZIP 압축 해제 → `chrome://extensions` → 개발자 모드 ON → "압축해제된 확장 프로그램을 로드합니다"
            - **Android**: APK 다운로드 → 설치 (출처를 알 수 없는 앱 허용 필요)
            - **iOS / macOS Safari**: 아래 "Source code" 다운로드 → `safari-extension/QuietLounge/QuietLounge.xcodeproj`를 Xcode에서 열어 직접 빌드/설치
          files: |
            QuietLounge-ChromeExtension.zip
            QuietLounge-Android.apk
